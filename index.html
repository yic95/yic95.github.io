<html>
<head>
<script>
let gpsPositionList = [];
navigator.geolocation.watchPosition(
	(pos) => {
        gpsPositionList.push(pos);
	},
	(err) => {
        gpsPositionList.push(null);
	},
	{enableHighAccuracy: true, timeout: 2000, maximumAge: 0}
);

let button = document.getElementById("copybutton");
button.addEventListener("click", writeClipboard);

async function writeClipboard() {
    type = "application/json";
    text = JSON.stringify(gpsPositionList);
    const clipboardItem = new ClipboardItem({[type]: text});
    await navigator.clipboard.write([clipboardItem]);
}
</script>
</head>
<body>
<button id="copybutton">複製資料</button>
</body>
</html>
